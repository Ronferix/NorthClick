backend:
  name: github
  repo: Ronferix/NorthClick
  branch: main
  base_url: https://www.northclick.net
  auth_endpoint: api/auth

locale: en
media_folder: img/projects
public_folder: /img/projects

collections:

  # ── Services & Pricing ──────────────────────────────────────────────────────
  - name: services
    label: Services & Pricing
    files:
      - label: Services Table
        name: services
        file: data/services.json
        fields:
          - label: Service Tabs
            name: tabs
            widget: list
            summary: "{{fields.label}}"
            label_singular: Tab
            fields:
              - label: Tab ID (no spaces, lowercase)
                name: id
                widget: string
                hint: "e.g. static, redesign, seo, addons — used as the URL anchor"
              - label: Label (English)
                name: label
                widget: string
              - label: Label (Spanish)
                name: labelEs
                widget: string
              - label: Intro text (English)
                name: intro
                widget: text
              - label: Intro text (Spanish)
                name: introEs
                widget: text
              - label: Services
                name: rows
                widget: list
                summary: "{{fields.name}} — {{fields.price}}"
                label_singular: Service
                fields:
                  - label: Name (English)
                    name: name
                    widget: string
                  - label: Name (Spanish)
                    name: nameEs
                    widget: string
                  - label: Includes / Description (English)
                    name: includes
                    widget: string
                  - label: Includes / Description (Spanish)
                    name: includesEs
                    widget: string
                  - label: Price (USD)
                    name: price
                    widget: string
                    hint: 'e.g. $320 – $640  or  Quote on req.'
                  - label: Est. Time (English)
                    name: time
                    widget: string
                    hint: "e.g. 3 – 5 days, Hours, Varies"
                  - label: Est. Time (Spanish)
                    name: timeEs
                    widget: string
                    hint: "e.g. 3 – 5 días, Horas, Variable"

  # ── Portfolio ───────────────────────────────────────────────────────────────
  - name: portfolio
    label: Portfolio
    files:
      - label: Projects
        name: projects
        file: data/projects.json
        fields:
          - label: Projects
            name: projects
            widget: list
            summary: "{{fields.title}} ({{fields.year}})"
            fields:
              - label: ID
                name: id
                widget: string
                hint: "Lowercase slug, no spaces. e.g. lumina-2025"
              - label: Title
                name: title
                widget: string
              - label: Category
                name: category
                widget: select
                options:
                  - { label: "Landing Page",      value: landing     }
                  - { label: "Professional Site",  value: profesional }
              - label: Year
                name: year
                widget: number
                default: 2025
              - label: Tags (English)
                name: tags
                widget: list
                field: { label: Tag, name: tag, widget: string }
              - label: Tags (Spanish)
                name: tagsEs
                widget: list
                field: { label: Tag, name: tag, widget: string }
              - label: Live URL
                name: liveUrl
                widget: string
                required: false
                hint: "Used to auto-generate the thumbnail screenshot"
              - label: Custom thumbnail
                name: thumb
                widget: image
                required: false
                hint: "Upload only if you want a custom image instead of the auto-screenshot"
              - label: Fallback icon (Bootstrap Icons class)
                name: thumbIcon
                widget: string
                required: false
                hint: "e.g. bi-stars — shown when there's no thumbnail or live URL"
              - label: Fallback gradient (CSS)
                name: thumbGradient
                widget: string
                required: false
                hint: "e.g. linear-gradient(135deg, #4338CA 0%, #7C3AED 100%)"
              - label: Demo project badge
                name: demo
                widget: boolean
                default: false
                hint: "Shows a 'Demo project' label on the card"
              - label: Description (English)
                name: desc
                widget: text
              - label: Description (Spanish)
                name: descEs
                widget: text
